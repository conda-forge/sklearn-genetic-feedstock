{% set name = "sklearn-genetic" %}
{% set version = "0.6.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sklearn-genetic-{{ version }}.tar.gz
  sha256: d5b5623e59feb6722cf5bb03b914dc93b8d93b3dff9103e5b9825241281b5338

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - deap >=1.0.2
    - multiprocess
    - numpy
    - python >={{ python_min }}
    - scikit-learn >=1.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - genetic_selection

about:
  home: https://github.com/manuel-calzolari/sklearn-genetic
  summary: Genetic feature selection module for scikit-learn
  license: LGPL-3.0-only
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - manuel-calzolari
